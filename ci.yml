name: CI — Plantão Pré-Op API

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB:       plantao_db_test
          POSTGRES_USER:     postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Rodar migração
        env:
          DB_HOST:     localhost
          DB_PORT:     5432
          DB_NAME:     plantao_db_test
          DB_USER:     postgres
          DB_PASSWORD: postgres
          JWT_SECRET:  test_secret_ci
        run: node src/db/migrate.js

      - name: Verificar build
        run: echo "Build OK — pronto para deploy"
